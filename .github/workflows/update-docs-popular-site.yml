name: Update Rankings Site

on:
  workflow_dispatch:
  schedule:
    - cron: "23 2 * * *"

permissions:
  contents: write

concurrency:
  group: update-rankings-site
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    env:
      CONTEXT7_API_KEY: ${{ secrets.CONTEXT7_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Refresh docs popular dataset
        run: |
          python3 scripts/fetch_context7_docs_popular.py \
            --limit 50 \
            --output-json docs/data/context7_docs_popular_top50.json \
            --output-csv docs/data/context7_docs_popular_top50.csv

      - name: Refresh docs extended dataset
        run: |
          python3 scripts/fetch_context7_docs_extended.py \
            --top-k 20000 \
            --max-workers 8 \
            --output-json docs/data/context7_docs_extended_top1000.json \
            --output-csv docs/data/context7_docs_extended_top1000.csv \
          || echo "WARN: docs extended fetch failed, keeping existing snapshot."

      - name: Refresh skills.sh primary dataset
        run: |
          python3 scripts/fetch_skills_sh_rankings.py \
            --view all-time \
            --limit 2000 \
            --keep-stale-on-error \
            --output-json docs/data/skills_sh_all_time_top2000.json \
            --output-csv docs/data/skills_sh_all_time_top2000.csv

      - name: Refresh skills ranked dataset
        run: |
          python3 scripts/fetch_context7_skills_for_site.py \
            --min-installs 0 \
            --keep-stale-on-error \
            --output-json docs/data/context7_skills_ranked_all.json \
            --output-csv docs/data/context7_skills_ranked_all.csv

      - name: Build rankings manifest
        run: |
          python3 scripts/build_rankings_manifest.py \
            --docs-json docs/data/context7_docs_popular_top50.json \
            --docs-extended-json docs/data/context7_docs_extended_top1000.json \
            --skills-sh-json docs/data/skills_sh_all_time_top2000.json \
            --context7-skills-json docs/data/context7_skills_ranked_all.json \
            --output-json docs/data/context7_rankings_manifest.json

      - name: Commit and push if changed
        run: |
          if [[ -n "$(git status --porcelain docs/data)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add \
              docs/data/context7_docs_popular_top50.json \
              docs/data/context7_docs_popular_top50.csv \
              docs/data/context7_docs_extended_top1000.json \
              docs/data/context7_docs_extended_top1000.csv \
              docs/data/skills_sh_all_time_top2000.json \
              docs/data/skills_sh_all_time_top2000.csv \
              docs/data/context7_skills_ranked_all.json \
              docs/data/context7_skills_ranked_all.csv \
              docs/data/context7_rankings_manifest.json
            git commit -m "chore: refresh docs and skills ranking data"
            git push
          else
            echo "No ranking data changes."
          fi
