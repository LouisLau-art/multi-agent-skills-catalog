<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Context7 Rankings Dashboard</title>
  <meta name="description" content="Auto-updated Context7 docs and skills rankings dashboard." />
  <style>
    :root {
      --bg: #f4f6f8;
      --panel: #ffffff;
      --line: #dde3ea;
      --text: #0f172a;
      --muted: #516071;
      --accent: #0f766e;
      --accent-soft: #e6f5f3;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: radial-gradient(circle at top right, #eaf6ff 0, #f4f6f8 45%);
      color: var(--text);
      font-family: "Segoe UI", "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
    }
    .wrap {
      max-width: 1260px;
      margin: 0 auto;
      padding: 24px 18px 40px;
    }
    h1 {
      margin: 0;
      font-size: clamp(24px, 4vw, 36px);
      letter-spacing: 0.02em;
    }
    .sub {
      margin-top: 8px;
      color: var(--muted);
      font-size: 15px;
    }
    .tabs {
      margin-top: 14px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .tab {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--muted);
      padding: 8px 12px;
      border-radius: 10px;
      font-size: 13px;
      cursor: pointer;
    }
    .tab.active {
      color: var(--accent);
      border-color: #9bd6d0;
      background: var(--accent-soft);
      font-weight: 600;
    }
    .note {
      margin-top: 10px;
      color: #475569;
      background: #f8fbfd;
      border: 1px solid #dbe7f3;
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 13px;
    }
    .bar {
      margin-top: 14px;
      display: grid;
      grid-template-columns: 1.1fr 1fr 1fr 1fr;
      gap: 10px;
    }
    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px 14px;
    }
    .k {
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .v {
      margin-top: 6px;
      font-size: 20px;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .controls {
      margin-top: 14px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
    }
    input[type="search"] {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 14px;
      background: #fff;
    }
    .btn {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
      padding: 10px 12px;
      font-size: 13px;
      cursor: pointer;
      color: var(--muted);
    }
    .table-shell {
      margin-top: 12px;
      border: 1px solid var(--line);
      border-radius: 12px;
      overflow: hidden;
      background: #fff;
    }
    .table-wrap {
      width: 100%;
      overflow: auto;
      max-height: 70vh;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 980px;
      font-size: 14px;
    }
    th, td {
      border-bottom: 1px solid #edf1f5;
      padding: 10px 10px;
      text-align: left;
      vertical-align: middle;
      white-space: nowrap;
    }
    thead th {
      position: sticky;
      top: 0;
      background: #f8fbfd;
      z-index: 1;
      color: #334155;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      cursor: pointer;
      user-select: none;
    }
    tr:hover td { background: #f8fbfd; }
    .rank { font-variant-numeric: tabular-nums; font-weight: 700; width: 56px; }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 12px; color: #334155; }
    .num { font-variant-numeric: tabular-nums; }
    .pct { color: #0f766e; font-weight: 600; }
    .muted { color: var(--muted); }
    .badge {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      font-size: 11px;
      padding: 3px 8px;
      border: 1px solid transparent;
    }
    .ok { background: #e8faf1; color: #11673d; border-color: #bce8d0; }
    .no { background: #f6f6f7; color: #65717f; border-color: #e2e8f0; }
    .cell-link {
      color: #0369a1;
      text-decoration: underline;
      text-decoration-thickness: 1px;
      text-underline-offset: 2px;
      text-decoration-color: #94cce8;
    }
    .cell-link:hover {
      color: #0c4a6e;
      text-decoration-color: currentColor;
    }
    .footer {
      margin-top: 12px;
      color: var(--muted);
      font-size: 12px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .error {
      margin-top: 16px;
      border: 1px solid #fecaca;
      background: #fff1f2;
      color: #9f1239;
      border-radius: 10px;
      padding: 12px;
      display: none;
      white-space: pre-wrap;
    }
    @media (max-width: 860px) {
      .bar { grid-template-columns: 1fr 1fr; }
      .controls { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Context7 Rankings Dashboard</h1>
    <div class="sub">Auto-updated ranking board for <b>docs libraries</b> and <b>skills</b>.</div>

    <div class="tabs">
      <button class="tab active" data-mode="docs">Docs Popular</button>
      <button class="tab" data-mode="docsExtended">Docs Extended</button>
      <button class="tab" data-mode="skills">Skills (ranked, no installs threshold)</button>
    </div>

    <div class="note" id="modeNote">Docs market-share ranking is currently limited by Context7 API to top 50 libraries. Search uses extended docs data when available.</div>

    <div class="bar">
      <div class="card"><div class="k">Rows</div><div class="v num" id="rowsCount">-</div></div>
      <div class="card"><div class="k" id="topLabel">Top Item</div><div class="v" id="topItem">-</div></div>
      <div class="card"><div class="k" id="metricLabel">Top Metric</div><div class="v num" id="topMetric">-</div></div>
      <div class="card"><div class="k">Last Updated (UTC)</div><div class="v num" id="generatedAt">-</div></div>
    </div>

    <div class="controls">
      <input id="searchBox" type="search" placeholder="Filter by name/source..." />
      <button id="resetBtn" class="btn" type="button">Reset Search/Sort</button>
    </div>

    <div class="table-shell">
      <div class="table-wrap">
        <table>
          <thead><tr id="theadRow"></tr></thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div>

    <div id="errorBox" class="error"></div>
    <div class="footer" id="footerInfo"></div>
  </div>

  <script>
    const MODES = {
      docs: {
        label: "Docs Popular",
        dataUrl: "./data/context7_docs_popular_top50.json",
        note: "Docs market-share ranking is limited by Context7 API to top 50 libraries. Search will use Docs Extended data when available.",
        topLabel: "Top Library",
        metricLabel: "Top Market Share",
        metricKey: "marketShare",
        metricFmt: (v) => (typeof v === "number" ? v.toFixed(2) + "%" : "-"),
        columns: [
          { key: "rank", label: "Rank", type: "num" },
          { key: "title", label: "Library", type: "text" },
          { key: "source", label: "Source", type: "mono" },
          { key: "marketShare", label: "Share %", type: "pct" },
          { key: "tokens", label: "Tokens", type: "num" },
          { key: "snippets", label: "Snippets", type: "num" },
          { key: "updateAgo", label: "Updated", type: "text" },
          { key: "trustScore", label: "Trust", type: "num" },
          { key: "verified", label: "Verified", type: "bool" }
        ]
      },
      docsExtended: {
        label: "Docs Extended",
        dataUrl: "./data/context7_docs_extended_top1000.json",
        note: "Rows 1-50 are official from Context7 /api/rankings. Rows after 50 are estimated (directional) from /api/libraries/all.",
        topLabel: "Top Library",
        metricLabel: "Top Market Share",
        metricKey: "officialMarketShare",
        metricFmt: (v) => (typeof v === "number" ? v.toFixed(2) + "%" : "-"),
        columns: [
          { key: "rank", label: "Rank", type: "num" },
          { key: "rankType", label: "Type", type: "text" },
          { key: "title", label: "Library", type: "text" },
          { key: "source", label: "Source", type: "mono" },
          { key: "officialMarketShare", label: "Official Share %", type: "pct" },
          { key: "estimatedScore", label: "Estimated Score", type: "num" },
          { key: "popularityRank", label: "Popularity Rank", type: "num" },
          { key: "snippets", label: "Snippets", type: "num" },
          { key: "tokens", label: "Tokens", type: "num" },
          { key: "updateAgo", label: "Updated", type: "text" },
          { key: "trustScore", label: "Trust", type: "num" },
          { key: "verified", label: "Verified", type: "bool" }
        ]
      },
      skills: {
        label: "Skills (ranked, no installs threshold)",
        dataUrl: "./data/context7_skills_ranked_all.json",
        note: "Skills list shows current ranked rows without an installs threshold (much larger than top 50).",
        topLabel: "Top Skill",
        metricLabel: "Top Installs",
        metricKey: "installCount",
        metricFmt: (v) => (typeof v === "number" ? new Intl.NumberFormat("en-US").format(v) : "-"),
        columns: [
          { key: "rank", label: "Rank", type: "num" },
          { key: "name", label: "Skill", type: "text" },
          { key: "source", label: "Source", type: "mono" },
          { key: "installCount", label: "Installs", type: "num" },
          { key: "trustScore", label: "Trust", type: "num" },
          { key: "verified", label: "Verified", type: "bool" },
          { key: "benchmarkScore", label: "Benchmark", type: "num" }
        ]
      }
    };

    const state = {
      mode: "docs",
      datasets: {},
      rows: [],
      query: "",
      sortKey: "rank",
      sortDir: "asc"
    };

    const el = {
      tabs: Array.from(document.querySelectorAll(".tab")),
      modeNote: document.getElementById("modeNote"),
      rowsCount: document.getElementById("rowsCount"),
      topLabel: document.getElementById("topLabel"),
      topItem: document.getElementById("topItem"),
      metricLabel: document.getElementById("metricLabel"),
      topMetric: document.getElementById("topMetric"),
      generatedAt: document.getElementById("generatedAt"),
      searchBox: document.getElementById("searchBox"),
      resetBtn: document.getElementById("resetBtn"),
      theadRow: document.getElementById("theadRow"),
      tbody: document.getElementById("tbody"),
      footerInfo: document.getElementById("footerInfo"),
      errorBox: document.getElementById("errorBox")
    };

    function showError(msg) {
      el.errorBox.style.display = "block";
      el.errorBox.textContent = msg;
    }

    function fmtNum(v) {
      if (typeof v !== "number" || Number.isNaN(v)) return "-";
      return new Intl.NumberFormat("en-US").format(v);
    }

    function escapeHtml(v) {
      return String(v)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function encodePathSegments(path) {
      return String(path || "")
        .split("/")
        .filter(Boolean)
        .map((seg) => encodeURIComponent(seg))
        .join("/");
    }

    function getSkillsLinks(row) {
      const rawSource = String(row?.source || "").trim();
      const rawName = String(row?.name || "").trim();
      const sourcePath = encodePathSegments(rawSource.replace(/^\/+/, ""));
      return {
        skillUrl: sourcePath && rawName
          ? `https://context7.com/skills/${sourcePath}/${encodeURIComponent(rawName)}`
          : "",
        githubUrl: sourcePath ? `https://github.com/${sourcePath}` : ""
      };
    }

    function textCell(v) {
      if (v === null || v === undefined || v === "") return "-";
      return escapeHtml(v);
    }

    function asComparable(row, key, mode) {
      const v = row[key];
      if (key === "updateAgo") return row.updateUtc || "";
      if (typeof v === "number") return v;
      if (typeof v === "boolean") return v ? 1 : 0;
      return (v || "").toString().toLowerCase();
    }

    function rowMatches(row, q, mode) {
      if (!q) return true;
      const primary = row.title || row.name || "";
      return primary.toLowerCase().includes(q) || (row.source || "").toLowerCase().includes(q);
    }

    function toDocsSearchRow(row) {
      if (!row || typeof row !== "object") return {};
      const out = { ...row };
      if (typeof out.marketShare !== "number" && typeof out.officialMarketShare === "number") {
        out.marketShare = out.officialMarketShare;
      }
      return out;
    }

    function getSearchBaseRows() {
      if (state.mode === "docs" && state.query.trim()) {
        const ext = state.datasets.docsExtended && Array.isArray(state.datasets.docsExtended.items)
          ? state.datasets.docsExtended.items
          : [];
        if (ext.length > 0) {
          return ext.map(toDocsSearchRow);
        }
      }
      return state.rows;
    }

    function getRenderedRows() {
      const q = state.query.trim().toLowerCase();
      const mode = state.mode;
      const rows = getSearchBaseRows().filter((r) => rowMatches(r, q, mode));
      rows.sort((a, b) => {
        const va = asComparable(a, state.sortKey, mode);
        const vb = asComparable(b, state.sortKey, mode);
        if (va < vb) return state.sortDir === "asc" ? -1 : 1;
        if (va > vb) return state.sortDir === "asc" ? 1 : -1;
        return 0;
      });
      return rows;
    }

    function renderHeader() {
      const cfg = MODES[state.mode];
      el.theadRow.innerHTML = cfg.columns
        .map((c) => {
          const mark = state.sortKey === c.key ? (state.sortDir === "asc" ? " ↑" : " ↓") : "";
          return `<th data-key="${c.key}">${c.label}${mark}</th>`;
        })
        .join("");

      Array.from(el.theadRow.querySelectorAll("th")).forEach((th) => {
        th.addEventListener("click", () => {
          const key = th.dataset.key;
          if (!key) return;
          if (state.sortKey === key) {
            state.sortDir = state.sortDir === "asc" ? "desc" : "asc";
          } else {
            state.sortKey = key;
            state.sortDir = key === "rank" ? "asc" : "desc";
          }
          render();
        });
      });
    }

    function renderRows() {
      const cfg = MODES[state.mode];
      const rows = getRenderedRows();
      el.tbody.innerHTML = rows
        .map((r) => {
          const tds = cfg.columns
            .map((c) => {
              const v = r[c.key];
              if (state.mode === "skills" && c.key === "name") {
                const links = getSkillsLinks(r);
                const text = textCell(v);
                if (links.skillUrl) {
                  return `<td><a class="cell-link" href="${links.skillUrl}" target="_blank" rel="noopener noreferrer">${text}</a></td>`;
                }
                return `<td>${text}</td>`;
              }
              if (state.mode === "skills" && c.key === "source") {
                const links = getSkillsLinks(r);
                const text = textCell(v);
                if (links.githubUrl) {
                  return `<td class="mono"><a class="cell-link" href="${links.githubUrl}" target="_blank" rel="noopener noreferrer">${text}</a></td>`;
                }
                return `<td class="mono">${text}</td>`;
              }
              if (c.type === "num") return `<td class="num">${fmtNum(v)}</td>`;
              if (c.type === "pct") return `<td class="pct num">${typeof v === "number" ? v.toFixed(2) + "%" : "-"}</td>`;
              if (c.type === "mono") return `<td class="mono">${textCell(v)}</td>`;
              if (c.type === "bool") {
                return `<td>${v ? '<span class="badge ok">yes</span>' : '<span class="badge no">no</span>'}</td>`;
              }
              if (c.key === "rank") return `<td class="rank num">${fmtNum(v)}</td>`;
              return `<td>${textCell(v)}</td>`;
            })
            .join("");
          return `<tr>${tds}</tr>`;
        })
        .join("");
      return rows;
    }

    function renderMeta(rows) {
      const cfg = MODES[state.mode];
      const ds = state.datasets[state.mode] || {};
      const baseRows = getSearchBaseRows();
      const top = baseRows.find((x) => x.rank === 1) || baseRows[0] || null;
      const docsGlobalSearchOn =
        state.mode === "docs" &&
        state.query.trim().length > 0 &&
        Array.isArray(state.datasets.docsExtended?.items) &&
        state.datasets.docsExtended.items.length > 0;

      el.modeNote.textContent = cfg.note;
      el.rowsCount.textContent = fmtNum(rows.length);
      el.topLabel.textContent = cfg.topLabel;
      el.metricLabel.textContent = cfg.metricLabel;
      el.topItem.textContent = top ? (top.title || top.name || "-") : "-";
      el.topMetric.textContent = top ? cfg.metricFmt(top[cfg.metricKey]) : "-";
      el.generatedAt.textContent = (ds.generatedAtUtc || "-").replace("T", " ").replace("+00:00", " UTC");

      const footer = [
        `Mode: ${cfg.label}`,
        `Rows in dataset: ${fmtNum(baseRows.length)}`,
        `Rows shown: ${fmtNum(rows.length)}`,
        `Source: ${cfg.dataUrl}`
      ];
      if (docsGlobalSearchOn) {
        footer.push("Search scope: Docs Extended dataset");
      }
      el.footerInfo.textContent = footer.join(" | ");
    }

    function render() {
      el.tabs.forEach((t) => t.classList.toggle("active", t.dataset.mode === state.mode));
      renderHeader();
      const rows = renderRows();
      renderMeta(rows);
    }

    async function loadMode(mode) {
      if (state.datasets[mode]) {
        state.mode = mode;
        state.rows = state.datasets[mode].items || [];
        state.sortKey = "rank";
        state.sortDir = "asc";
        render();
        return;
      }

      const cfg = MODES[mode];
      const resp = await fetch(cfg.dataUrl, { cache: "no-store" });
      if (!resp.ok) throw new Error(`HTTP ${resp.status} loading ${cfg.dataUrl}`);
      const payload = await resp.json();
      if (!Array.isArray(payload.items)) throw new Error(`Invalid payload shape in ${cfg.dataUrl}`);
      state.datasets[mode] = payload;
      state.mode = mode;
      state.rows = payload.items;
      state.sortKey = "rank";
      state.sortDir = "asc";
      render();
    }

    el.tabs.forEach((tab) => {
      tab.addEventListener("click", async () => {
        const mode = tab.dataset.mode;
        if (!mode || mode === state.mode) return;
        try {
          await loadMode(mode);
        } catch (err) {
          showError(String(err));
          console.error(err);
        }
      });
    });

    el.searchBox.addEventListener("input", (e) => {
      state.query = e.target.value || "";
      render();
    });

    el.resetBtn.addEventListener("click", () => {
      state.query = "";
      state.sortKey = "rank";
      state.sortDir = "asc";
      el.searchBox.value = "";
      render();
    });

    (async () => {
      try {
        await loadMode("docs");
        await loadMode("docsExtended");
        await loadMode("skills");
        // switch back to docs initial view
        state.mode = "docs";
        state.rows = state.datasets.docs.items;
        state.sortKey = "rank";
        state.sortDir = "asc";
        render();
      } catch (err) {
        showError("Failed to load ranking data files. Check GitHub Action outputs in docs/data.");
        console.error(err);
      }
    })();
  </script>
</body>
</html>
